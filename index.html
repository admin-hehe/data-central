<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Data Central</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #f8fafc;
      color: #1e293b;
    }
    
    /* Dark Mode Styling */
    @media (prefers-color-scheme: dark) {
      body { background-color: #0f172a; color: #f1f5f9; }
      .main-card { background: #1e293b !important; border-color: #334155 !important; }
      .input-field { background: #0f172a !important; border-color: #334155 !important; color: white !important; }
      .table-header { background: #111827 !important; color: #94a3b8 !important; }
      .row-data { border-color: #334155 !important; }
      .text-dim { color: #94a3b8 !important; }
    }

    /* Fix Responsive Table vs Card */
    @media (max-width: 768px) {
      .desktop-table { display: none; }
      .mobile-card-container { display: block; }
      .card-item {
        background: white;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      }
      @media (prefers-color-scheme: dark) {
        .card-item { background: #1e293b; border: 1px solid #334155; }
      }
    }
    @media (min-width: 769px) {
      .mobile-card-container { display: none; }
      .desktop-table { display: table; }
    }

    .custom-gradient {
      background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
    }
  </style>
</head>
<body class="min-h-screen pb-10">

  <div class="h-2 w-full custom-gradient"></div>

  <div class="max-w-6xl mx-auto px-4 mt-8">
    
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Data Central<span class="text-indigo-500">.</span></h1>
        <p class="text-sm text-gray-500 text-dim">Hello World!</p>
      </div>
      <div id="rowsSummary" class="px-4 py-2 bg-indigo-500 text-white text-xs font-bold rounded-lg shadow-lg shadow-indigo-500/20 uppercase tracking-wider">
        Memuat...
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-6">
      <div class="md:col-span-9 relative">
        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input id="searchInput" type="text" placeholder="Cari data..." 
               class="input-field w-full pl-12 pr-4 py-3.5 bg-white border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm shadow-gray-100" />
      </div>
      <div class="md:col-span-3">
        <select id="rowsPerPageSelect" 
                class="input-field w-full px-4 py-3.5 bg-white border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-sm appearance-none cursor-pointer shadow-sm shadow-gray-100">
          <option value="10">10 Baris</option>
          <option value="25">25 Baris</option>
          <option value="50">50 Baris</option>
        </select>
      </div>
    </div>

    <div class="main-card bg-white border border-gray-100 rounded-[24px] overflow-hidden shadow-xl shadow-gray-200/50">
      
      <table class="desktop-table w-full text-left border-collapse" id="dataTable">
        <thead id="tableHead" class="table-header bg-gray-50 text-[11px] font-bold uppercase tracking-widest text-gray-500 border-b border-gray-100">
        </thead>
        <tbody id="tableBody" class="divide-y divide-gray-50">
        </tbody>
      </table>

      <div id="mobileContainer" class="mobile-card-container p-4 bg-gray-50 dark:bg-slate-900/50">
      </div>

      <div id="pagination" class="p-6 border-t border-gray-100">
      </div>
    </div>

  </div>

<script>
/* LOGIC TETAP SAMA NAMUN RENDERER DIUPDATE UNTUK DUA VIEW */
const SCRIPT_URL = "/api";
const API_URL = SCRIPT_URL + "?action=ambilDataBaru";
let originalData = [];
let currentPage = 1;
let rowsPerPage = 10;

const searchInput = document.getElementById('searchInput');
const rowsPerPageSelect = document.getElementById('rowsPerPageSelect');
const tableHead = document.getElementById('tableHead');
const tableBody = document.getElementById('tableBody');
const mobileContainer = document.getElementById('mobileContainer');
const paginationEl = document.getElementById('pagination');
const rowsSummary = document.getElementById('rowsSummary');

async function fetchData() {
  rowsSummary.textContent = "Syncing...";
  try {
    const res = await fetch(API_URL, { cache: "no-store" });
    const json = await res.json();
    originalData = Array.isArray(json) ? json : [];
    renderTable();
  } catch (err) {
    rowsSummary.textContent = "Error";
    renderTable();
  }
}

function esc(s) {
  return s === null || s === undefined ? "" : String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function getFilteredData() {
  const q = (searchInput.value || "").trim().toLowerCase();
  if (!q) return originalData.slice();
  return originalData.filter(row => Object.values(row).some(v => v && String(v).toLowerCase().includes(q)));
}

function renderTable() {
  const filtered = getFilteredData();
  const totalItems = filtered.length;
  const totalPages = Math.max(1, Math.ceil(totalItems / rowsPerPage));
  if (currentPage > totalPages) currentPage = totalPages;

  const startIndex = (currentPage - 1) * rowsPerPage;
  const endIndex = Math.min(startIndex + rowsPerPage, totalItems);
  const pageSlice = filtered.slice(startIndex, endIndex);

  // Clear
  tableHead.innerHTML = "";
  tableBody.innerHTML = "";
  mobileContainer.innerHTML = "";

  if (totalItems === 0) {
    const emptyMsg = `<div class="p-10 text-center text-gray-400">Data tidak ditemukan</div>`;
    tableBody.innerHTML = `<tr><td colspan="100%">${emptyMsg}</td></tr>`;
    mobileContainer.innerHTML = emptyMsg;
    rowsSummary.textContent = "0 Baris";
    return;
  }

  const columns = Object.keys(filtered[0]);

  // Render Desktop Header
  const thRow = document.createElement('tr');
  columns.forEach(col => {
    const th = document.createElement('th');
    th.className = "px-6 py-4";
    th.innerHTML = esc(col);
    thRow.appendChild(th);
  });
  tableHead.appendChild(thRow);

  // Render Rows (Desktop & Mobile)
  pageSlice.forEach(row => {
    // Desktop Row
    const tr = document.createElement('tr');
    tr.className = "hover:bg-indigo-50/50 dark:hover:bg-indigo-900/10 transition-colors";
    
    // Mobile Card
    const card = document.createElement('div');
    card.className = "card-item";

    columns.forEach(col => {
      const val = esc(row[col]);
      
      // Fill Desktop
      const td = document.createElement('td');
      td.className = "px-6 py-4 text-sm font-medium row-data";
      td.innerHTML = val;
      tr.appendChild(td);

      // Fill Mobile
      card.innerHTML += `
        <div class="flex justify-between py-2 border-b border-gray-100 dark:border-gray-700/50 last:border-0">
          <span class="text-[10px] uppercase font-bold text-indigo-500">${esc(col)}</span>
          <span class="text-sm font-semibold ml-5">${val}</span>
        </div>
      `;
    });
    tableBody.appendChild(tr);
    mobileContainer.appendChild(card);
  });

  rowsSummary.textContent = `${totalItems} Total Baris`;
  renderPaginationControls(totalItems, totalPages);
}

function renderPaginationControls(totalItems, totalPages) {
  paginationEl.innerHTML = `
    <div class="flex items-center justify-between">
      <button id="prevBtn" class="px-6 py-2 text-sm font-bold rounded-xl border border-gray-200 dark:border-gray-700 disabled:opacity-30 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">Prev</button>
      <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Hal ${currentPage} / ${totalPages}</span>
      <button id="nextBtn" class="px-6 py-2 text-sm font-bold rounded-xl border border-gray-200 dark:border-gray-700 disabled:opacity-30 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">Next</button>
    </div>
  `;

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;

  prevBtn.onclick = () => { currentPage--; renderTable(); window.scrollTo(0,0); };
  nextBtn.onclick = () => { currentPage++; renderTable(); window.scrollTo(0,0); };
}

rowsPerPageSelect.addEventListener('change', (e) => {
  rowsPerPage = parseInt(e.target.value);
  currentPage = 1;
  renderTable();
});

let debounceTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => { currentPage = 1; renderTable(); }, 250);
});

fetchData();
</script>
</body>
</html>
