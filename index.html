<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DATA CENTRAL</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #fdfdfd;
      --main: #a3e635; /* Lime Neon */
      --secondary: #8b5cf6; /* Violet */
      --black: #000000;
    }

    body { 
      font-family: 'Space Grotesk', sans-serif; 
      background-color: #f0f0f0;
      color: var(--black);
    }

    h1, .neo-title { font-family: 'Public Sans', sans-serif; font-weight: 900; }

    /* Neo-Brutalism Utility Classes */
    .neo-brutal-box {
      background: white;
      border: 3px solid var(--black);
      box-shadow: 6px 6px 0px 0px var(--black);
      transition: all 0.2s ease;
    }

    .neo-brutal-box:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0px 0px var(--black);
    }

    .neo-brutal-btn {
      border: 3px solid var(--black);
      box-shadow: 4px 4px 0px 0px var(--black);
      font-weight: 700;
      transition: all 0.1s ease;
    }

    .neo-brutal-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px 0px var(--black);
    }

    .neo-input {
      border: 3px solid var(--black);
      box-shadow: 4px 4px 0px 0px var(--black);
      outline: none;
    }

    .neo-input:focus {
      background-color: #fef9c3; /* Soft yellow alert */
    }

    @media (max-width: 768px) {
      .desktop-table { display: none; }
      .mobile-card-container { display: block; }
    }
    @media (min-width: 769px) {
      .mobile-card-container { display: none; }
      .desktop-table { display: table; }
    }

    /* Table specifics */
    th {
      border-bottom: 3px solid var(--black) !important;
      background: var(--main) !important;
    }
    td {
      border-bottom: 2px solid var(--black) !important;
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
      <div>
        <h1 class="text-5xl md:text-7xl uppercase tracking-tighter leading-none mb-2">
          DATA <span class="bg-lime-400 px-2 border-4 border-black">CENTRAL</span>
        </h1>
        <p class="text-xl font-bold uppercase italic text-gray-700 italic">PROMOTION TOOLS_</p>
      </div>
      <div id="rowsSummary" class="neo-brutal-box bg-violet-400 px-6 py-3 text-lg font-black uppercase">
        Loading...
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
      <div class="md:col-span-8">
        <label class="block text-xs font-black uppercase mb-1">Cari Data Disini:</label>
        <div class="relative">
          <input id="searchInput" type="text" placeholder="KETIK SESUATU..." 
                 class="neo-input w-full p-4 text-lg font-bold placeholder-gray-400" autocomplete="off"/>
        </div>
      </div>
      <div class="md:col-span-4">
        <label class="block text-xs font-black uppercase mb-1">Limit Baris:</label>
        <select id="rowsPerPageSelect" 
                class="neo-input w-full p-4 text-lg font-bold appearance-none cursor-pointer bg-white">
          <option value="10">10 BARIS</option>
          <option value="25">25 BARIS</option>
          <option value="50">50 BARIS</option>
        </select>
      </div>
    </div>

    <div class="neo-brutal-box overflow-hidden mb-10">
      <table class="desktop-table w-full text-left" id="dataTable">
        <thead id="tableHead" class="text-sm font-black uppercase tracking-tighter italic">
        </thead>
        <tbody id="tableBody" class="bg-white">
        </tbody>
      </table>

      <div id="mobileContainer" class="mobile-card-container p-4 space-y-4 bg-gray-200">
      </div>

      <div id="pagination" class="p-6 bg-white border-t-4 border-black">
      </div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
